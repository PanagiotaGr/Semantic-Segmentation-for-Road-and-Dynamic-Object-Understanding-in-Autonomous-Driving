experiment:
  name: unet_camvid_5class
  seed: 42
  deterministic: true

data:
  dataset: camvid
  root: data/CamVid
  train_split: train
  validation_split: val
  test_split: test
  image_size: [256, 256]
  num_classes: 5
  class_names: [background, road, sidewalk, vehicle, pedestrian]
  pedestrian_class_id: 4
  ignore_index: 255
  # CamVid 12-class ids: sky, building, pole, road, pavement, tree,
  # sign-symbol, fence, car, pedestrian, bicyclist, unlabeled.
  label_mapping: [0, 0, 0, 1, 2, 0, 0, 0, 3, 4, 3, 0]

augmentation:
  horizontal_flip_probability: 0.5
  brightness_jitter: 0.15

model:
  name: unet
  encoder: resnet34
  encoder_weights: imagenet
  in_channels: 3
  num_classes: 5

training:
  epochs: 50
  batch_size: 4
  num_workers: 4
  optimizer:
    name: adam
    learning_rate: 0.001
  loss:
    name: cross_entropy
    ignore_index: 255
  monitor: validation_miou
  monitor_mode: max

output:
  root: outputs
  save_best_checkpoint: true
  save_last_checkpoint: true
