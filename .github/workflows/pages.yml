name: Documentation Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docs-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check documentation files
        run: |
          test -f README.md
          test -f docs/phd_proposal.md
          test -f docs/research_roadmap.md
          test -f docs/experiment_matrix.md
          test -f configs/phd_research_program.yaml

      - name: Explain Pages status
        run: |
          echo "Documentation files are present."
          echo "GitHub Pages deployment is disabled because Pages is not enabled/configured for this repository."
          echo "Do not use ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION=true; it does not fix the Pages configuration error."
          echo "To publish later, enable GitHub Pages in repository settings and restore the Pages deployment steps."
