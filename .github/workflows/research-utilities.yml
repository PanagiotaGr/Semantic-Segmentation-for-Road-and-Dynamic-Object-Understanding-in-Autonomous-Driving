name: Research Utility Test Suite

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  research-utilities:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch pytest pillow

      - name: Run research utility tests
        run: |
          pytest \
            tests/test_uncertainty.py \
            tests/test_temporal_metrics.py \
            tests/test_temporal_diff.py \
            tests/test_temporal_losses.py \
            tests/test_temporal_dataset.py \
            tests/test_temporal_fusion.py
